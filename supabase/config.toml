# Slice 2: deterministic recommender. Consumes recent signals and writes moves.
# Called by pg_cron every 5 minutes + on-demand by elevated users from the
# Today surface. Auth is validated inside the function via x-internal-service
# -secret header or resolved caller role.
[functions.recommend-moves]
verify_jwt = false

# Slice 3: ambient capture adapters — write into the signals feed.
# All three auth internally via x-internal-service-secret (service-role
# callers) or a JWT with admin/manager/owner role.
[functions.inbound-email-signal]
verify_jwt = false

[functions.telematics-signal-ingest]
verify_jwt = false

[functions.news-mention-scan]
verify_jwt = false

# Ask Iron — the QRM assistant. verify_jwt = false so the function can pull
# the auth header itself via resolveCallerContext; requireCaller() inside
# rejects anonymous traffic with 401.
[functions.qrm-ask-iron]
verify_jwt = false
