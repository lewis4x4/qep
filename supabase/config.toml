# DGE routes validate JWT + roles in _shared/dge-auth.ts (resolveCallerContext).
# Gateway verify_jwt is off so local/CLI tests can reach the function when the Edge
# gateway JWT check disagrees with supabase-js session tokens (401 Invalid JWT).
# QA curl: always send apikey: <SUPABASE_ANON_KEY> with Authorization: Bearer <access_token>.
