# Wave 6.11 Flare submit endpoint. Validates the JWT internally via
# supabase.auth.getUser() so the gateway-level verify must be disabled
# (otherwise the gateway 401s before the function's CORS handler runs and
# the browser sees "Load failed" with no actionable error).
[functions.flare-submit]
verify_jwt = false

# Wave 6.11 Flare close-the-loop notifier. Same internal-auth pattern as
# flare-submit; gateway verify disabled so the function-level CORS preflight
# handler can return properly.
[functions.flare-notify-fixed]
verify_jwt = false

# Wave 7 Iron Companion functions. ALL use requireServiceUser() internally
# (Bearer + supabase.auth.getUser(token)), so gateway verify_jwt MUST be off
# — otherwise the gateway 401s clients with stale/expiring tokens before the
# function ever runs, and the operator sees a useless "Invalid JWT" with no
# context. Same pattern as flare-submit + integration-availability.
[functions.iron-orchestrator]
verify_jwt = false

[functions.iron-knowledge]
verify_jwt = false

[functions.iron-execute-flow-step]
verify_jwt = false

[functions.iron-undo-flow-run]
verify_jwt = false

[functions.iron-transcribe]
verify_jwt = false

[functions.iron-tts]
verify_jwt = false
