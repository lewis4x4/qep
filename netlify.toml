# Env: set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in Netlify UI (see docs/SERVICE_ENGINE_PRODUCTION_SIGNOFF.md).
[build]
  base = "apps/web"
  command = "bun run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Include wss + *.supabase.com so Safari can reach Auth/Realtime/pooler; *.co alone is not always enough.
    # Sentry: connect-src needs *.ingest.sentry.io (events), *.ingest.us.sentry.io (US region ingest),
    # and sentry.io (replay session uploads). Without these the SDK silently CSP-blocks every captureException.
    # worker-src 'self' blob: is required by Sentry's session replay integration which spawns a Web Worker
    # from a Blob URL for compression. Without it Safari blocks the worker spawn and replay can't initialize.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.com wss://*.supabase.com https://api.anthropic.com https://api.hubapi.com https://graph.microsoft.com https://login.microsoftonline.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://sentry.io; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"