# Quote Builder Playwright suite. Pull requests run against their Netlify
# deploy preview; workflow_dispatch/default staging runs use
# https://qualityequipmentparts.netlify.app.
# IRON_WIZARD_DECOMPOSITION_PLAN_2026-05-15 §7 step 5.
#
# Required repo secrets (same-repo PRs / staging dispatch):
#   PLAYWRIGHT_TEST_EMAIL — staging rep/admin test user
#   PLAYWRIGHT_TEST_PASSWORD
#   PLAYWRIGHT_AGED_EQUIPMENT_ID — CRM UUID for approval-bypass spec (365+ day received_at)
name: E2E Staging

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/e2e-staging.yml"
  workflow_dispatch:

concurrency:
  group: e2e-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Warn when staging credentials missing (same-repo PRs)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_AGED_EQUIPMENT_ID: ${{ secrets.PLAYWRIGHT_AGED_EQUIPMENT_ID }}
        run: |
          if [ -z "$PLAYWRIGHT_TEST_EMAIL" ] || [ -z "$PLAYWRIGHT_TEST_PASSWORD" ] || [ -z "$PLAYWRIGHT_AGED_EQUIPMENT_ID" ]; then
            echo "::warning::PLAYWRIGHT_TEST_EMAIL / PLAYWRIGHT_TEST_PASSWORD / PLAYWRIGHT_AGED_EQUIPMENT_ID not all set — running guest route smoke only."
          fi

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Wait for deploy preview
        if: github.event_name == 'pull_request'
        env:
          PLAYWRIGHT_BASE_URL: ${{ format('https://deploy-preview-{0}--qualityequipmentparts.netlify.app', github.event.pull_request.number) }}
        run: |
          for attempt in {1..30}; do
            if curl -fsSIL "$PLAYWRIGHT_BASE_URL/" >/dev/null; then
              exit 0
            fi
            echo "Waiting for $PLAYWRIGHT_BASE_URL to become reachable ($attempt/30)..."
            sleep 5
          done
          echo "::error::Deploy preview did not become reachable: $PLAYWRIGHT_BASE_URL"
          exit 1

      - name: Run quote builder staging e2e
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'pull_request' && format('https://deploy-preview-{0}--qualityequipmentparts.netlify.app', github.event.pull_request.number) || 'https://qualityequipmentparts.netlify.app' }}
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_AGED_EQUIPMENT_ID: ${{ secrets.PLAYWRIGHT_AGED_EQUIPMENT_ID }}
        run: |
          if [ -z "$PLAYWRIGHT_TEST_EMAIL" ] || [ -z "$PLAYWRIGHT_TEST_PASSWORD" ] || [ -z "$PLAYWRIGHT_AGED_EQUIPMENT_ID" ]; then
            echo "Full staging e2e secrets unavailable (fork PR or missing repo secret) — guest route smoke only."
            bunx playwright test tests/e2e/quote-wizard-happy-path.spec.ts -g "unauthenticated visit is gated"
          else
            bun run test:e2e:staging
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
