# WAVE Quality Tail (Slice 1): authenticated Lighthouse mobile workflow.
#
# Runs `lhci autorun` against the eight highest-value sales-rep routes
# in mobile emulation. Triggered on PRs that touch apps/web/** so a
# regression to performance or accessibility blocks the merge.
#
# Two execution modes:
#
#   Authenticated (when PLAYWRIGHT_TEST_EMAIL + PLAYWRIGHT_TEST_PASSWORD
#   secrets are available — same-repo PRs and workflow_dispatch):
#     1. `bun run lighthouse:auth-setup` signs in via Playwright and
#        writes apps/web/.lighthouse-storage-state.json.
#     2. `bunx lhci autorun` runs with LHCI_AUTHENTICATED=true so the
#        puppeteerScript at scripts/lighthouse-puppeteer-auth.cjs
#        loads that storage state into the headless browser before
#        each audit — /sales/* routes render the real SalesShell.
#
#   Guest fallback (fork PRs without secrets, or local debug):
#     - The workflow emits a ::warning:: and runs `bun run
#       lighthouse:mobile` which still hits the eight URLs but
#       measures the login page for routes that gate.
#
# Pull requests target their Netlify deploy preview so CI is validating
# the exact branch artifact. workflow_dispatch still targets staging by
# default (https://qep.blackrockai.co), with LHCI_BASE_URL overridable by
# the base_url input.
name: Lighthouse Mobile

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/lighthouse-mobile.yml"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override LHCI base URL (defaults to staging)."
        required: false
        default: "https://qep.blackrockai.co"

concurrency:
  group: lighthouse-mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Project-wide env so each step's `if:` can check env.HAS_CREDS
    # to branch between the authenticated path and the guest fallback.
    env:
      HAS_CREDS: ${{ secrets.PLAYWRIGHT_TEST_EMAIL != '' && secrets.PLAYWRIGHT_TEST_PASSWORD != '' && 'true' || '' }}
      LHCI_BASE_URL: ${{ github.event_name == 'pull_request' && format('https://deploy-preview-{0}--qualityequipmentparts.netlify.app', github.event.pull_request.number) || github.event.inputs.base_url || 'https://qep.blackrockai.co' }}
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (authenticated path only)
        if: env.HAS_CREDS == 'true'
        run: bunx playwright install chromium --with-deps

      - name: Wait for deploy preview
        if: github.event_name == 'pull_request'
        run: |
          for attempt in {1..30}; do
            if curl -fsSIL "$LHCI_BASE_URL/" >/dev/null; then
              exit 0
            fi
            echo "Waiting for $LHCI_BASE_URL to become reachable ($attempt/30)..."
            sleep 5
          done
          echo "::error::Deploy preview did not become reachable: $LHCI_BASE_URL"
          exit 1

      - name: Capture authenticated storage state
        if: env.HAS_CREDS == 'true'
        env:
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
        run: bun run lighthouse:auth-setup

      - name: Lighthouse — authenticated mobile run
        if: env.HAS_CREDS == 'true'
        env:
          LHCI_AUTHENTICATED: "true"
        run: bunx lhci autorun --config=.lighthouserc.cjs

      - name: Lighthouse — guest fallback when no credentials
        if: env.HAS_CREDS != 'true'
        env:
          LHCI_GUEST_FALLBACK: "true"
        run: |
          echo "::warning::Running Lighthouse against guest routes only (PLAYWRIGHT_TEST_EMAIL / PLAYWRIGHT_TEST_PASSWORD not available — typically a fork PR)."
          bun run lighthouse:mobile
