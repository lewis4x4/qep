      - docs/IntelliDealer/_OCR/Phase-1_CRM/Customer Profile: Search and Listing.txt
    intellidealer_field_type: text
    intellidealer_purpose: |
      Federal Employer Identification Number — the IRS-issued nine-digit
      identifier (NN-NNNNNNN). MANDATORY for any customer that the dealer
      will issue a 1099-NEC or 1099-MISC to (cash-receipt subcontractors,
      independent operators, certain landlord/lease scenarios). Also
      required by AvaTax for sales-tax-exemption substantiation, by OFAC
      sanctions screening as a deterministic identity hook, and by the
      manufacturer warranty programs (John Deere FinancialOps, Bobcat
      OneCall, Vermeer Connect) to federate customer records across
      dealer networks.
    qep_status: BUILT
    qep_table: qrm_companies
    qep_column: ein
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.qrm_companies.ein"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains qrm_companies.ein."
    severity: must
    category: regulatory
    migration_hint: |
      ALTER TABLE qrm_companies ADD COLUMN ein TEXT;
      ALTER TABLE qrm_companies ADD CONSTRAINT qrm_companies_ein_format_chk
        CHECK (ein IS NULL OR ein ~ '^\d{2}-\d{7}$');
      CREATE INDEX ON qrm_companies (workspace_id, ein) WHERE ein IS NOT NULL;
      COMMENT ON COLUMN qrm_companies.ein IS
        'Federal EIN (NN-NNNNNNN). Required for 1099 issuance, AvaTax exemption substantiation, OFAC screening.';
      -- Row-level access: EIN is sensitive PII — restrict to admin + finance roles via RLS
    ui_surface_hint: "Customer Profile (Details) — Tax/Regulatory block, masked except for last 4 to non-finance roles"
