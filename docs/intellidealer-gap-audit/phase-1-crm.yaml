# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE — Phase-1 CRM (Customer Profile + Prospect Board)
# This phase is composed of multiple surfaces under three menu paths
# (Financial Mgmt > AR > Customer Profile; Customer Care > CRM > Customer
# Profile; Management Central > CRM > Customer Profile; Product Support >
# Equipment > Prospect Board), all backed by data source CMASTR (customer)
# and CGISP (prospect).
#
# Customer Profile: a single record per customer with TEN tabs:
#   1. Profile (the wide edit screen — primary regulatory / financial fields)
#   2. Contact (per-customer contact list w/ salesperson by department)
#   3. Notifications (4 risk/birthday flags)
#   4. Supplier Mapping (cross-ref to OEM supplier customer numbers)
#   5. Cross Reference (external IDs)
#   6. Memos (pinned + history notes)
#   7. Loyalty Programs (enrolled programs + tier)
#   8. Ship To (additional ship-to addresses)
#   9. Supplement Shipping (special handling: hazmat, lift-gate, sig req)
#  10. (Listing search: Customer Listing entry point)
#
# Prospect Board: pre-customer pipeline with status / source / selling /
# trading / customer / salesperson and free-text comments.
#
# CRITICAL FINDING — Brian's anchor concern (EIN/Federal Tax ID):
# Neither qrm_companies, qrm_contacts, crm_companies, nor crm_contacts has
# any column named ein, federal_ein, tax_id, or fein. The only tax_id in
# the entire schema is on the dealership/branches table (the dealership's
# own EIN, NOT the customer's). The IntelliDealer Customer Profile
# explicitly carries a "RESALE CERT #" field, "Tax Code 1/2/3/4", "Labor
# Tax Code 1/2", "Exempt Status", and an "AvaTax Entity Use Code" — none
# of these have QEP equivalents. The single largest regulatory gap in
# Phase-1 is the absence of an EIN / federal tax ID on the customer
# record. Without it QEP cannot:
#   * issue 1099s for cash-receipt subcontractors
#   * pass an AvaTax sales-tax decision
#   * substantiate a sales-tax-exemption certificate
#   * resolve a customer in OFAC / sanctions screening
#   * federate a customer with state-issued resale certs
# This is a MUST-FIX-BEFORE-CUTOVER blocker.
#
# Other regulatory gaps (all MISSING):
#   * RESALE CERT #         (visible on Customer Profile, no QEP column)
#   * Sales-Tax Tax Code 1-4 (location-by-location tax routing)
#   * Labor Tax Code 1-2     (separate tax routing for labor lines)
#   * AvaTax Entity Use Code (regulated tax-exemption-reason enum)
#   * Exempt Status          (free-text exemption explanation)
#   * NAICS code             (not visible — but expected per industry)
#   * DUNS / Dun & Bradstreet ID Number  (visible label "Dun & Bradstreet
#                                          ID Number" — no column)
#   * Opt Out of Sale of PI / Do Not Share PI (CCPA / state-privacy flags)
#
# Financial gaps (all MISSING):
#   * AR Type (Open Item / Balance Forward)
#   * Statement Combination
#   * Statement Message
#   * Statement Date
#   * PO Number / PO Expiry (per-customer mandatory-PO control)
#   * IBE Account #
#   * Customer Pricing Group / Pricing Level
#   * Discount group
#   * Late Charge flag
#   * Print Retail Price control
#   * Print Parts Invoices control
#   * Auto Email Inspection control
#   * Terms (Normal / NET-X)
#   * Credit Limit (visible on AR-side reports — see Phase-5)
#
# Operational gaps (all MISSING):
#   * Search 1 / Search 2     (legacy 10-char fast-search keys)
#   * Customer Number         (legacy alphanumeric — distinct from UUID)
#   * Township / Lot / Concession (Canadian rural addressing)
#   * Preferred Language      (driver of statement / invoice language)
#   * Brand of Interest       (manufacturer affinity — used in marketing)
#   * Size                    (operation size bucket)
#   * Owner                   (named owner for B2B)
#   * Per-department salesperson (parts/service/rental/equipment/admin/other)
#   * Notification flags      (payment issues / multi-account / legal /
#                              birthday — risk + relationship signals)
#   * Supplier Mapping        (manufacturer -> supplier customer number)
#   * Loyalty programs        (no loyalty schema at all)
#   * Ship-To address book    (multi-address, default flag, freight terms)
#   * Supplement Shipping     (hazmat / lift-gate / signature-required)
#   * Prospect record         (selling, trading, source, status — no
#                              dedicated table; closest is qrm_deals
#                              which is post-conversion only)
#
# QEP currently has, for customer/contact, only:
#   qrm_companies: id, name, dba, legal_name, address_line_1/2, city,
#     state, postal_code, country, county, phone, website, status,
#     classification, parent_company_id, territory_code, assigned_rep_id,
#     hubspot_company_id, notes, metadata (Json), workspace_id, timestamps
#   qrm_contacts: id, first_name, last_name, title, email, phone,
#     primary_company_id, assigned_rep_id, sms_opt_in (+at +source),
#     hubspot_contact_id, dge_customer_profile_id, merged_into_contact_id,
#     metadata (Json), workspace_id, timestamps
#   crm_* mirror tables with same shape (read-only views? appear to be
#     duplicates with all-nullable columns)
#   crm_external_id_map: generic external-ID lookup (object_type/source
#     _system/external_id/internal_id) — could absorb IntelliDealer ID +
#     OEM portal IDs but is currently underused
#   tax_exemption_certificates: per-cert table linked by crm_company_id —
#     PARTIAL coverage for RESALE CERT # (the cert number lives here, but
#     IntelliDealer surfaces a single primary cert # inline on the
#     customer record, while QEP requires a separate cert row + lookup)
#   qrm_custom_field_definitions / qrm_custom_field_values: arbitrary
#     custom fields keyed to object_type — could absorb the long tail of
#     gap fields, but regulatory fields (EIN, RESALE CERT #) MUST be
#     first-class typed columns, not Json values
#
# We mark MISSING aggressively for any field where the closest QEP target
# is metadata Json — Json is not a real column in business terms (no
# index, no validation, no schema). PARTIAL is reserved for shape /
# typing mismatches against a real typed column.
# ─────────────────────────────────────────────────────────────────────────────

