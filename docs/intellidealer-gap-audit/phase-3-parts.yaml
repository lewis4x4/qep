  - id: part.months_supply
    intellidealer_label: "Months Supply"
    intellidealer_screen: "Parts Profile (Additional Information)"
    intellidealer_data_source: "PMASTR"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-3_Parts_Parts-Profile__3.19.53.txt
    intellidealer_field_type: number
    intellidealer_purpose: "On-hand divided by monthly demand — months of stock at current burn rate."
    qep_status: PARTIAL
    qep_table: null
    qep_column: null
    qep_evidence:
      - "computed via parts_catalog.on_hand / parts_history_monthly aggregation"
    qep_gap_notes: ""
    severity: should
    category: reporting
    migration_hint: |
      CREATE OR REPLACE VIEW v_parts_months_supply AS
        SELECT pc.id, pc.workspace_id,
          CASE WHEN m.avg_monthly_qty > 0
               THEN pc.on_hand::numeric / m.avg_monthly_qty
               ELSE NULL END AS months_supply
        FROM parts_catalog pc
        LEFT JOIN (
          SELECT part_catalog_id, AVG(quantity_sold) AS avg_monthly_qty
          FROM parts_history_monthly
          WHERE month_start > now() - INTERVAL '6 months'
          GROUP BY part_catalog_id
        ) m ON m.part_catalog_id = pc.id;
    ui_surface_hint: "Parts Profile — Additional Info block"
    dependencies: []

