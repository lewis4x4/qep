# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE — Phase-3 Parts
# Parts is the highest-margin, highest-volume revenue stream in any equipment
# dealership. The IntelliDealer Parts module spans:
#
#   1. Parts Profile / Parts Listing  — the master record per part
#      (Part Number, Description, Bin, Vendor, Source, Class, Type,
#      OnHand, On Order, OFC), with rich Parts Availability sub-screens
#      (Sell, List Price, Cost, Average Cost, Levels 1-4, Reorder Point,
#      Safety Stock, EOQ, AMAX APR Code, Season Code, Movement Code,
#      Activity Code, Lost Sale, Special Order, YTD Sales, history grid,
#      OFC Reclass, Subs, Reman, Comment).
#   2. Parts Invoicing — counter-sale + service-pull invoice creation
#      (Order Number, Customer, Salesperson, Responsible, PO, Ship Via,
#      Freight Terms, Discount, Tax 1-4, Sold-To/Ship-To, Print Parameters,
#      Ordered/Issued/Shipped/Invoiced quantities per line, OFC indicator,
#      Cash Code, Tethr It Now button).
#   3. Parts Ordering — internal stock orders (Order #, Vendor, Date
#      Released, Location, Status [On Order / Back Ordered / Changeable /
#      Received], Type, Line Items, Vendor block, Price Breaks, Purchase
#      Details, Vendor Detail).
#   4. Parts Quoting — separate parts-quote ladder (Reference Number,
#      Customer, Salesperson, Description, Location, Expiry Date, Status
#      [Pending/Quoted/Accepted/Expired], Master Quotes filter, sub-screen
#      Parts-Quoting-Service for quotes that turn into a service WO).
#   5. Purchase Orders — vendor-side PO (PO Number, Type, Status [PO
#      Request / Waiting for Authorization / Authorized / On Order /
#      Canceled / Back Order / Completed / Rejected], Description,
#      Vendor Number/Name/Address, Vendor Contact, Items Total, Freight
#      Charge, PO Total, Customer (the customer the PO was placed for),
#      Receipt History).
#   6. Price Matrix — bracket-based pricing (Matrix code, Pricing Detail,
#      Price Breaks ladder by quantity bracket).
#
# QEP COVERAGE TODAY (per database.types.ts) — surprisingly rich:
#   parts_catalog               (fat master table; covers nearly every Parts
#                                Profile field: part_number, description,
#                                bin_location, branch_code, category,
#                                category_code, class_code, compatible_machines,
#                                cost_price, average_cost, eoq, intellidealer_
#                                part_id, last_count_date, last_known_price,
#                                last_po_number, last_sale_date, last_year_
#                                sales_dollars/qty, lead_time_days, list_price,
#                                manufacturer, model_code, movement_code,
#                                on_hand, on_order, parts_per_package, pkg_qty,
#                                pricing_level_1-4, quantity_allocated/reserved,
#                                reorder_point, safety_stock_qty, source_of_
#                                supply, stocking_code, superseded_by, supersedes,
#                                uom, vendor_code, weight_lb/lbs, ytd_sales_dollars,
#                                avatax_product_code, avatax_use_exemption,
#                                back_ordered, raw_dms_row, embedding columns,
#                                manual_override booleans for each price+attrs,
#                                source_documents, region_last_12mo_sales,
#                                last_12mo_sales)
#   parts_inventory             (per-branch per-bin balance: part_number,
#                                bin_location, branch_id, qty_on_hand,
#                                catalog_id)
#   parts_orders                (vendor-side stock orders)
#   parts_order_lines           (line items)
#   parts_order_events          (state transitions)
#   parts_order_notification_sends
#   parts_invoices              (customer parts invoice header)
#   parts_quoting_service*      (parts quotes that link to service)
#   parts_pricing_rules         (pricing rules engine)
#   parts_pricing_audit         (price-change audit)
#   parts_pricing_suggestions   (AI-suggested price changes)
#   parts_vendor_prices         (per-vendor price lookup)
#   parts_cross_references      (manufacturer cross-refs)
#   parts_demand_forecasts      (forecast horizon)
#   parts_fulfillment_runs      (allocation runs)
#   parts_fulfillment_events
#   parts_history_monthly       (historical sales aggregation)
#   parts_import_runs / parts_import_conflicts (DMS sync)
#   parts_predictive_kits       (kit suggestion AI)
#   parts_preferences
#   parts_reorder_profiles      (per-branch reorder behavior)
#   parts_replenishment_rules
#   parts_request_activity / parts_requests
#   parts_transfer_recommendations
#   parts_auto_replenish_queue
#   parts_analytics_snapshots
#   vendor_part_catalog         (vendor catalog)
#   vendor_profiles, vendor_contacts, vendor_order_schedules,
#   vendor_escalation_policies, vendor_escalations
#   customer_parts_intelligence (per-customer parts insight AI layer)
#   price_increase_tracking
#   tariff_tracking
#   v_parts_dead_capital, v_parts_intelligence, v_parts_margin_signal,
#   v_parts_pricing_drift, v_parts_stockout_risk, v_parts_velocity (views)
#
# MAJOR GAPS for Phase-3 (despite rich parts_catalog):
#   * Parts Invoicing Header lifecycle — Order Number → Pending → Issued
#     → Shipped → Invoiced flow with per-line Ord/Iss/Ship/Inv columns.
#     parts_invoices likely covers some of this but verify the four-stage
#     quantity ladder.
#   * Parts Invoice "View Back Orders" button — list of unreceived back-
#     ordered lines on this customer's invoice. Operational primitive.
#   * Cash Code on parts invoice line (per-line cash-vs-AR routing).
#   * Sold-To / Ship-To split per parts invoice (qrm_company_ship_to_
#     addresses dependency from Phase-1).
#   * Tax Codes 1-4 on parts invoice header (separate from per-customer
#     Tax Codes from Phase-1; per-WO tax codes from Phase-4).
#   * Discount group on parts invoice header.
#   * Freight Terms on parts invoice header.
#   * UPS WorldShip Import — integration to push shipping labels to UPS.
#   * LDTTN (Loose Dead-Track Total Number?) Adjust button — IntelliDealer-
#     specific bulk-adjust function.
#   * Tethr It Now (telematics-driven part lookup) integration button.
#   * Print Parameters (per-invoice print configuration).
#   * Customer Parts Purchases sub-screen (drill-into customer's parts
#     history from this invoice).
#   * Vendor PO Header — PO Number, Type, Status (8 enum), Created/Modified/
#     Authorized/Ordered/Closed timestamps + actor, Items Total, Freight
#     Charge, PO Total, Customer (the customer the PO was placed for),
#     Receipt History sub-grid.
#   * Vendor Contact block on PO (Name, Phone, Fax, E-mail, Dealer flag).
#   * Vendor Details block (Address 1-3, Zip, Phone, Fax) cross-vendor.
#   * Purchase Order Items grid (Part #, Quantity, Cost, Extended Cost,
#     Receipt Status). parts_order_lines covers some.
#   * Receipt History per PO.
#   * Price Matrix master table (Matrix code, Description, Pricing Method,
#     Apply Order). parts_pricing_rules may cover but verify shape.
#   * Price Breaks per matrix (quantity bracket → price multiplier).
#   * Pricing Detail per matrix line (Source / List Price / Cost / Average
#     Cost / Level 1-4 input → output mapping).
#   * Parts Quoting Header (Reference Number, Status, Salesperson,
#     Assigned Salesperson, Description, Expiry Date, Master Quote flag,
#     Customer, Location). Need to verify if a parts-side quote table
#     exists separate from qb_quotes (which is equipment-side).
#   * Parts Quoting Service link — quote → WO conversion (parts_quoting_
#     service tables may already cover this).
#   * Movement Code, Activity Code values (controlled enum vs free text in
#     parts_catalog.movement_code).
#   * AMAX APR Code / Source — manufacturer AMAX (Annual Min/Max) replenishment
#     code that drives the auto-reorder cycle.
#   * OFC (Original Factory Code) Reclass tracking (From / To Element) —
#     manufacturer reclassification trail.
#   * Season Code + Season Length (seasonal-demand modifier).
#   * Effectual % (forecasting confidence factor).
#   * Reserved vs Allocated distinction — parts_catalog has both qty_reserved
#     and qty_allocated; verify they're surfaced to the UI.
#   * Lost Sale tracking (Frequency + Quantity counters) — critical
#     stockout-impact metric. parts_catalog doesn't appear to have lost-sale
#     columns; need a lost_sales table.
#   * Special Order tracking (Frequency + Quantity).
#   * Sub-Pmts / Reman flag (re-manufactured part) per part.
#   * Comment / Memo per part (rich-text annotations from buyers).
#   * Central Branch / Central Order routing (multi-branch consolidation).
#   * Protect Months / Protect Quantity / Protect Code (no-pick reserve
#     levels).
#   * Required Quantity (next-period demand forecast).
#   * "Do Not Order" flag + date (exclude part from auto-reorder).
# ─────────────────────────────────────────────────────────────────────────────

