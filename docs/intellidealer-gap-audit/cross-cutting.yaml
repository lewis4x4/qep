      sort key on the listing screen and the foreign key carried into every
      payroll, work-order, parts-counter, sales, service, and traffic
      transaction. Every cost roll-up in the system joins on this value. It
      appears wherever "Salesperson", "Service Advisor", "Technician",
      "Counter Person", "Driver", "Coordinator" is referenced in any other
      phase.
    qep_status: BUILT
    qep_table: "employees"
    qep_column: "employee_number"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.employees.employee_number"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains employees.employee_number."
    severity: "must"
    category: "financial"
    migration_hint: |
      CREATE TABLE employees (
        id uuid primary key default gen_random_uuid(),
        workspace_id uuid not null references workspaces(id),
        profile_id uuid references profiles(id),
        employee_number text not null,
        unique (workspace_id, employee_number)
      );
    ui_surface_hint: "Settings > Team > Employees; surfaced as join key on every cost report"
