  # SURFACE 4 — SECURITY / ROLES (NUMBERED ACCESS CODES)
  # IntelliDealer's per-screen security switch (e.g., 604 - Payroll, 804 -
  # Product Support / Traffic). Carried on the user/role record.
  # ============================================================================
  - id: security_switch.code
    intellidealer_label: "Security Switch (per-screen access code)"
    intellidealer_screen: "(displayed at the top of every help page)"
    intellidealer_data_source: "EMPLOYEE / SECURITY tables"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR/Cross-Cutting/Employee Profile.txt
      - docs/IntelliDealer/_OCR/Cross-Cutting/Traffic Management.txt
    intellidealer_field_type: "text"
    intellidealer_purpose: |
      Three-digit numbered access code referenced on every IntelliDealer
      screen (e.g., "Security: 604 - Payroll", "Security: 804 - Product
      Support, Traffic"). The user / role record carries the set of switch
      numbers granted to that user. This is the canonical authorization
      taxonomy referenced from every other phase's documentation.
    qep_status: BUILT
    qep_table: "security_switches"
    qep_column: "(new table)"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.security_switches"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains security_switches."
    severity: "must"
    category: "regulatory"
    migration_hint: |
      CREATE TABLE security_switches (
        id uuid primary key default gen_random_uuid(),
        workspace_id uuid not null,
        code text not null,
        screen_id text,
        description text,
        unique (workspace_id, code)
      );

      CREATE TABLE security_role_switches (
        role_id uuid not null,
        switch_code text not null,
        granted_at timestamptz not null default now(),
        granted_by uuid references profiles(id),
        revoked_at timestamptz,
        primary key (role_id, switch_code)
      );

      CREATE TABLE security_user_switch_overrides (
        profile_id uuid not null,
        switch_code text not null,
        grant boolean not null,
        effective_from timestamptz not null default now(),
        effective_to timestamptz,
        primary key (profile_id, switch_code, effective_from)
      );
    ui_surface_hint: "Settings > Security > Switch Map"
