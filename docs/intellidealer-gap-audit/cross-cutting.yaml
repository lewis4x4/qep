# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE
#
# The Cross-Cutting phase covers six platform-wide surfaces that every
# IntelliDealer module shares:
#
#   1. Employee Profile        (Financial Management > Payroll > Employee
#                               Profile). Data Source: EMPLOYEE.
#                               Security switch: 604 - Payroll. Rev 2024.10.
#   2. Traffic Management      (Product Support > Equipment/Service/Rental >
#                               Traffic). Data Source: CGIDR.
#                               Security switch: 804 - Product Support, Traffic.
#                               Rev 2026.02. Tabs: Listing, Weekly, Monthly,
#                               Receipt, Shipping Information, Stock Add Ons,
#                               Attachments, Comments, Multimedia.
#                               Sub-types: Demo, Loaner, Rental, Transfer,
#                               Sale, Purchase, Service, Trade In,
#                               Miscellaneous, Re-rent, Customer Transfer,
#                               Job Site Transfer.
#   3. Branch / Location Master (CTLLOC + profit-center mapping). Carries the
#                               GL profit-center digit (0=Balance, 1=Admin,
#                               2=Equipment, 3=Parts, 4=Service, 5=Rental,
#                               6-9=user-defined) referenced in nearly every
#                               other phase.
#   4. Security / Roles         IntelliDealer's numbered access-code system
#                               (Security ###). Every screen documents its
#                               own switch number; the user's role record
#                               carries which switch numbers are granted.
#   5. Audit                    Universal change history — who/what/when on
#                               every transactional record.
#   6. Geofence / Territory     Territory codes, geofence polygons, ZIP-to-
#                               territory mapping (used by CRM, Service,
#                               Rental, Deal Genome).
#
# QEP has reasonable coverage of (3) branches, (4) RLS-style role enforcement,
# (5) per-domain audit (qrm_*_audit_events, qb_*_audit, parts_pricing_audit,
# document_audit_events, customer_profile_access_audit), and (6) territory
# + geofence. QEP has NO employee/payroll table — `profiles` is auth-only and
# carries no employee number, hire/termination, GL routing class, profit-
# center, shop class, shop rate, shift code, or supervisor. QEP has NO
# branch-to-branch traffic ticket header (the `traffic_tickets` table that
# exists is a delivery/dispatch ticket, not the inbound/outbound equipment-
# movement receipt with type/sub-type, line items, attachments, weekly
# calendar). QEP has NO dedicated security_switches table — RLS policies are
# all-or-nothing per role, with no fine-grained per-screen switch number.
#
# These gaps block QEP from replacing IntelliDealer for:
#   • Payroll / GL-cost-of-labor reconciliation (Phase-4 service profitability)
#   • Yard-to-yard equipment moves (Phase-2/Rental ops)
#   • Audit-grade who/what/when on shared cross-domain records
#   • Customer / dealer-org access control beyond the role-coarse default
# ─────────────────────────────────────────────────────────────────────────────

