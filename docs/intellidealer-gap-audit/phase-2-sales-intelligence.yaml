# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE — Phase-2 Sales Intelligence
# Equipment-side commerce: the Profile (the asset of record), the Quoting
# pipeline (selling motion), the Listing (inventory search), the Invoicing
# pipeline (post-sale ledger), Trade-In handling (the largest single source
# of margin leak in the industry), the Sales Support Portal (rep workspace),
# and the Base & Options catalog (manufacturer-published configurations).
#
# Surfaces (per IntelliDealer):
#   1. Equipment Profile (Profile / Base & Options / Attachments / Parts List
#      / MyDealer / Multimedia / Warranty Dates / Rental Specifications tabs)
#   2. Equipment Listing (filterable search across Status × In/Out × Make ×
#      Model × Class × Group × Customer × Location × Options × Identifier)
#   3. Equipment Quoting (Quote Header + N Quote Segments — each is a
#      stock-number/option line with Unit Price, Trade-In, Other deductions)
#   4. Equipment Invoicing (Sales Support Portal): post-sale invoice ledger
#      with Pending / Posted / VESign signing-status / Reference / Salesperson
#      / Stock # search; child surfaces for Trade-Ins, Sub-Pmts, Programs
#   5. Equipment Invoicing Trade-Ins  (multi-trade-per-invoice with
#      Pay-Off, Lien Holder, Allowance, Disposition)
#   6. Sales Support Portal (cross-stock workspace for the salesman: Quotes,
#      Pending, Quick Adds, Telematics)
#   7. Base & Options  (manufacturer-published base+options codes, Mass
#      Increase/Decrease, Bobcat Base & Options Import, Vermeer Import)
#
# QEP COVERAGE TODAY:
#   qrm_equipment           (asset record — id, name, make, model, year,
#                            serial_number, vin_pin, asset_tag,
#                            engine_hours, mileage, condition, availability,
#                            ownership, category, weight_class, fuel_type,
#                            location_description, lat/lng, photo_urls,
#                            purchase_date, purchase_price, current_market_value,
#                            replacement_cost, daily/weekly/monthly_rental_rate,
#                            warranty_expires_on, last_inspection_at,
#                            next_service_due_at, intake_stage, readiness_status,
#                            sale_ready_at, aging_bucket, primary_contact_id,
#                            company_id, metadata Json)
#   qb_quotes               (quoting engine with margin layers — quote_number,
#                            equipment_model_id, equipment_cost_cents,
#                            list_price_cents, baseline_sales_price_cents,
#                            markup_cents/pct, dealer_discount_cents/pct,
#                            good_faith_cents/pct, attachments_*_cents (4),
#                            cil_amount_cents, doc_fee_cents, freight_cents,
#                            pdi_cents, tariff_cents/pct, rebate_total_cents,
#                            tax_cents/rate_pct, trade_in_allowance_cents,
#                            trade_in_book_value_cents, subtotal_cents,
#                            total_cents, status, valid_until, version,
#                            applied_program_ids, financing_scenario,
#                            customer_type/details, parent_quote_id, pdf_url,
#                            requires_approval, approved_by/at,
#                            originating_log_id, salesman_id)
#   qb_quote_line_items     (per-line equipment, attachments, services)
#   qb_quote_outcomes       (won/lost reasons, deal closure)
#   qb_deals                (executed sale — deal_number, quote_id,
#                            commission_cents/rate_pct/paid, gross_margin,
#                            invoice_number, total_cost/revenue,
#                            warranty_registration_date, rebate_filed_at/by/due,
#                            close_date, delivery_date, won/lost_reason)
#   qb_trade_ins            (trade-in record — make, model, year, serial,
#                            hours, allowance_cents, book_value_cents,
#                            over_under_cents, disposition, valuation_source,
#                            crm_equipment_id (incoming asset), deal_id)
#   qb_brands, qb_brand_sheet_sources, qb_equipment_models, qb_price_sheets,
#   qb_price_sheet_items/programs, qb_program_stacking_rules,
#   qb_freight_zones, qb_internal_freight_rules, qb_margin_thresholds,
#   qb_margin_exceptions, qb_service_credit_config
#   qb_attachments          (PDFs/photos attached to a quote)
#   qb_notifications, qb_sheet_watch_events, qb_ai_request_log
#   qb_deal_coach_actions   (AI-suggested coaching for sales)
#   customer_invoices       (downstream AR side)
#   quote_packages, quote_package_line_items, quote_signatures,
#   quote_tax_breakdowns, quote_incentive_applications, quotes (legacy)
#
# QEP MAJOR GAPS for Phase-2:
#   * Stock Number (legacy IntelliDealer alphanumeric, e.g. "Q003418" or
#     "CNV00006") — qrm_equipment.id is a UUID; asset_tag and name are
#     free-text. Need a dedicated stock_number column with workspace-
#     unique constraint.
#   * Base / Options model — qrm_equipment has make/model but no Base
#     code (e.g. "MISCBASE" or "A-T24-V35BKP*EBS") and no Option-list
#     subtable. Manufacturer-published Base & Options is a regulated
#     vocabulary used in OEM portals.
#   * Equipment Status enum (Invoiced / Inventory / On Order / Sold /
#     Presold / Rental / Consignment / Transferred) — current enum
#     crm_equipment_availability covers some of this but not all 8 values.
#   * In/Out + In/Out Sub Type (Available, Sold, Reserved, Pending Sale,
#     Hold) — second-level workflow state separate from Status.
#   * Class / Type / Group / Category / Subclass — multi-level
#     manufacturer taxonomy (e.g. ATTACHMENTS / TRENCH BUCKET /
#     16/24INCH); qrm_equipment has only category.
#   * Yard Location / Control Number / Equipment Identifier — physical
#     location and dealer-internal alphanumeric identifiers distinct from
#     stock #.
#   * Engine Serial #, Transmission Serial # (qrm_equipment has serial_number
#     only — need engine + transmission serials separately for warranty).
#   * Hour-meter ledger (Machine Hours/Code/Date with Code = Actual /
#     Estimate / Tampered / Replaced; Machine2 Hours/Code/Date for
#     dual-meter machines). qrm_equipment.engine_hours is a single number
#     with no audit trail.
#   * Warranty Hours (Basic + Extended) with Code + Date — drives the
#     warranty-eligibility decision on every WO. qrm_equipment has only
#     warranty_expires_on (a date).
#   * Cost layers visible on Equipment Profile: Invoice Amount, Current
#     Cost, Net Book Value, Reference Amount, Note Amount, Finance Amount,
#     Settlement Amount, Maintenance Expense, Rental Cost Percentage,
#     Rental Insurable Amount, Rental Amount. qrm_equipment has only
#     purchase_price and current_market_value.
#   * Avatax Product Code — required AvaTax integration field for
#     equipment-line tax decisions.
#   * Sale Account / Inventory Account (per-equipment GL routing) —
#     no GL columns on qrm_equipment.
#   * Customer Invoice Number, Customer Invoice Date, Customer Name,
#     Customer Fleet Number — denormalized invoice link on equipment
#     for fast lookup. Need view or columns.
#   * Last Count Method / Last Count Date — physical-inventory cycle-count
#     audit fields.
#   * Quote Segments (one quote → N stock-number lines) — qb_quotes has
#     a single equipment_model_id. qb_quote_line_items exists which
#     should cover this; need to verify shape matches IntelliDealer's
#     two-digit segment numbering.
#   * Quote Tax Codes 1-4 per quote (separate from equipment tax codes) —
#     qb_quotes.tax_cents is a single total; need per-jurisdiction
#     breakdown that quote_tax_breakdowns may already cover.
#   * Quote Sold-To / Ship-To split (same as work_order in Phase-4) —
#     qb_quotes has no per-quote address override.
#   * Equipment Invoicing pipeline: Pending → Posted lifecycle. customer_
#     invoices may handle this but verify the IntelliDealer status-set
#     match.
#   * VESign (e-signature) integration: signing status enum
#     (Awaiting / Partially Signed / Signed / Declined) per invoice.
#     quote_signatures may cover this for quotes; need an analogue for
#     equipment invoices.
#   * Trade-In Pay-Off + Lien Holder fields on trade record — qb_trade_ins
#     has no payoff_amount or lien_holder columns. Critical for clean
#     title transfer.
#   * Trade-In Disposition (Wholesale / Recondition / Wholesale Auction
#     / Retail / Crush). qb_trade_ins.disposition is free TEXT — needs
#     enum.
#   * F&I (Finance + Insurance) overlay on a quote — financing_scenario
#     is JSON; need a typed F&I product-line table.
#   * IBE Account # / Customer Pricing Group on the invoice header
#     (carry-over from customer Phase-1).
#   * Manufacturer warranty registration on delivery (Date + Confirmation
#     # + OEM portal acknowledgment). qb_deals has warranty_registration_date
#     but no portal-confirmation #.
#   * Base & Options manufacturer import (Bobcat Base & Options Import,
#     Vermeer Base and Options Import buttons) — entirely missing.
#   * Mass Increase / Decrease on Base & Options pricing — bulk-edit
#     workflow not supported.
#   * Sales Support Portal cross-stock dashboard — no equivalent rep
#     workspace surface.
# ─────────────────────────────────────────────────────────────────────────────

fields:
  # ==========================================================================
  # SECTION 1 — EQUIPMENT IDENTIFICATION
  # ==========================================================================














  - id: equipment.stock_number
    intellidealer_label: "Stock Number"
    intellidealer_screen: "Equipment Profile (Profile tab)"
    intellidealer_data_source: "EMASTR"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-2_Sales-Intelligence_Equipment-Profile__3.03.06.txt
      - docs/IntelliDealer/_OCR_PNG/Phase-2_Sales-Intelligence_Equipment-Profile__3.02.42.txt
    intellidealer_field_type: text
    intellidealer_purpose: |
      Six-character alphanumeric stock number (e.g. "Q000188", "CNV00006",
      "BLADES"). Customer-facing identifier on every quote, invoice,
      work order, rental contract, and OEM warranty submission. Reps
      know units by stock # not UUID; preserving the legacy convention
      is non-negotiable for IntelliDealer cutover.
    qep_status: BUILT
    qep_table: qrm_equipment
    qep_column: null
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.qrm_equipment"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains qrm_equipment."
    severity: must
    category: regulatory
    migration_hint: |
      ALTER TABLE qrm_equipment ADD COLUMN stock_number TEXT;
      CREATE UNIQUE INDEX ON qrm_equipment (workspace_id, stock_number)
        WHERE stock_number IS NOT NULL;
      COMMENT ON COLUMN qrm_equipment.stock_number IS
        'IntelliDealer/EMASTR alphanumeric stock # (preserved through migration)';
    ui_surface_hint: "Equipment Profile header + every list view"
    dependencies: []

  - id: equipment.base_code
    intellidealer_label: "Base"
    intellidealer_screen: "Equipment Profile (Profile tab) / Base & Options"
    intellidealer_data_source: "EMASTR / EBASE"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-2_Sales-Intelligence_Equipment-Profile__3.03.06.txt
      - docs/IntelliDealer/_OCR/Phase-2_Sales-Intelligence/Base & Options.txt
    intellidealer_field_type: fk
    intellidealer_purpose: |
      Manufacturer-published base configuration code (e.g. "MISCBASE"
      catch-all, "A-T24-V35BKP*EBS" for an ASV trenching bucket). Drives
      base-price loading on new equipment and serves as the parent for
      the Option list. Required for OEM order-portal submission.
    qep_status: BUILT
    qep_table: equipment_base_codes
    qep_column: null
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.equipment_base_codes"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains equipment_base_codes."
    severity: must
    category: regulatory
    migration_hint: |
      CREATE TABLE equipment_base_codes (
        id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
        workspace_id uuid NOT NULL,
        base_number TEXT NOT NULL,
        description TEXT,
        make TEXT,
        model TEXT,
        group_code TEXT,
        class_code TEXT,
        price_cents BIGINT,
        cost_cents BIGINT,
        active_for_build BOOLEAN NOT NULL DEFAULT true,
        active_for_equipment BOOLEAN NOT NULL DEFAULT true,
        added_at DATE,
        modified_at DATE,
        miscellaneous TEXT,
        UNIQUE (workspace_id, base_number)
      );
      ALTER TABLE qrm_equipment ADD COLUMN base_code_id UUID REFERENCES equipment_base_codes(id);
    ui_surface_hint: "Equipment Profile (Profile tab) — Base lookup; Base & Options master screen"
    dependencies: []

  - id: equipment.options
    intellidealer_label: "Options (per-base option list)"
    intellidealer_screen: "Equipment Profile (Base & Options tab)"
    intellidealer_data_source: "EOPT"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-2_Sales-Intelligence_Equipment-Profile__3.03.32.txt
      - docs/IntelliDealer/_OCR/Phase-2_Sales-Intelligence/Base & Options.txt
    intellidealer_field_type: json
    intellidealer_purpose: |
      List of optional features attached to a Base (e.g. cab heat,
      hydraulic coupler, warranty extension). Each option has its own
      Number, Description, Price, Master Price, Cost, Master Cost,
      Added/Modified date, Active flag.
    qep_status: BUILT
    qep_table: equipment_options
    qep_column: null
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.equipment_options"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains equipment_options."
    severity: must
    category: regulatory
    migration_hint: |
      CREATE TABLE equipment_options (
        id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
        workspace_id uuid NOT NULL,
        base_code_id uuid NOT NULL REFERENCES equipment_base_codes(id),
        option_number TEXT NOT NULL,
        description TEXT,
        price_cents BIGINT,
        master_price_cents BIGINT,
        cost_cents BIGINT,
        master_cost_cents BIGINT,
        added_at DATE,
        modified_at DATE,
        is_active BOOLEAN NOT NULL DEFAULT true,
        UNIQUE (workspace_id, base_code_id, option_number)
      );
      CREATE TABLE equipment_selected_options (
        id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
        workspace_id uuid NOT NULL,
        equipment_id uuid NOT NULL REFERENCES qrm_equipment(id),
        option_id uuid NOT NULL REFERENCES equipment_options(id),
        UNIQUE (workspace_id, equipment_id, option_id)
      );
    ui_surface_hint: "Equipment Profile — Base & Options tab grid"
    dependencies: [equipment.base_code]

  - id: equipment.description
