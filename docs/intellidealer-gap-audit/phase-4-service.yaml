    qep_status: BUILT
    qep_table: service_jobs
    qep_column: updated_at
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.service_jobs.updated_at"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains service_jobs.updated_at."
    severity: should
    category: operational
    migration_hint: |
      CREATE OR REPLACE VIEW v_service_jobs_last_activity AS
        SELECT j.id, GREATEST(
          MAX(t.clocked_in_at), MAX(t.clocked_out_at), MAX(p.created_at)
        ) AS last_activity_at
        FROM service_jobs j
        LEFT JOIN service_timecards t ON t.service_job_id = j.id
        LEFT JOIN parts_fulfillment_runs p ON p.id = j.fulfillment_run_id
        GROUP BY j.id;
    ui_surface_hint: "Open WO listing column"
    dependencies: []

  - id: work_order.current_value
    intellidealer_label: "Current Value (WIP $)"
    intellidealer_screen: "Open Work Orders listing"
    intellidealer_data_source: "WORDH"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-4_Service_Open-Work-Orders__3.26.50.txt
    intellidealer_field_type: currency
    intellidealer_purpose: |
      WIP $ accrued on the WO so far (parts issued + labor billed at
      cost/rate, minus any pre-billed amounts). Drives the WIP aging
      report.
    qep_status: BUILT
    qep_table: service_jobs
    qep_column: invoice_total
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.service_jobs.invoice_total"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains service_jobs.invoice_total."
    severity: must
    category: financial
    migration_hint: |
      CREATE MATERIALIZED VIEW mv_service_jobs_wip AS
        SELECT j.id, j.workspace_id,
          COALESCE(SUM(t.hours * lp.rate_per_hour_cents), 0)
            + COALESCE(SUM(p.qty * p.unit_cost_cents), 0) AS wip_value_cents,
          GREATEST(j.created_at, MAX(t.clocked_in_at)) AS earliest_activity_at
        FROM service_jobs j
        LEFT JOIN service_timecards t ON t.service_job_id = j.id
        LEFT JOIN service_parts_actions p ON p.service_job_id = j.id
        LEFT JOIN labor_pricing_matrix lp ON lp.branch_id = j.branch_id
        GROUP BY j.id;
      CREATE INDEX ON mv_service_jobs_wip (workspace_id, wip_value_cents DESC);
    ui_surface_hint: "Open WO listing column + WIP aging report"
    dependencies: []

