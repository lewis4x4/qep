# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE — Phase-4 Service (Work Orders + Service Agreements + ID
# InspectionPlus + Labor Pricing + Job Codes + Technician Scheduling +
# Work In Process aging)
#
# This is the largest single phase by surface count and the highest-revenue
# day-to-day activity for any equipment dealership. Service revenue is also
# the highest-margin line and the most operationally complex (multi-segment
# WOs, warranty claims, PM contracts, technician scheduling, parts staging).
#
# Surfaces:
#   1. Work Order Header  (Reference Number, Customer, Stock #, PO, Tax
#      Codes 1-4 for both Parts and Labor blocks, Sold-To/Ship-To split,
#      Pricing Group, Total A/R, Credit Limit display, Latitude/Longitude pin)
#   2. Work Order Segments (a single WO can have N segments: 01="DO NOT
#      DELETE SEGMENT", 02="SALES LOADING…". Each segment has its own Job
#      Code, Technician, Status, Hours, GL routing. CRITICAL primitive
#      that QEP currently lacks.)
#   3. Work Order Detail – Job Code (Job Code Number, Description, Type,
#      Reason, Make/Model, Estimated Hours, Quantity)
#   4. Work Order Detail – Three-Cs (Description, Complaint, Correction —
#      Cause is implied from prose)
#   5. Work Order Detail – Labor tab (Status, Technician, Parts, Labor,
#      Estimated Hours per row)
#   6. Work Order Detail – Parts tab (parts requested/issued, with reverse
#      highlight indicating "issued on a parts order")
#   7. Work Order Quoting (separate quote module — same skeleton as WOs
#      but Status enum is Pending/Quoted/Accepted/Expired)
#   8. Work Order Listing & Open Work Orders (filterable grid: WO#, Cust,
#      Stock#, Salesperson, Assigned Salesperson, Model, Serial#, PO#,
#      Ship Via, Location, Segment Status, Outstanding POs, Current Value,
#      Date Added, Last Activity)
#   9. Work In Process (aging buckets: Current, 31-60, 61-90, 91-120,
#      Over 120 — totaled to compute WIP $ and %. Driven by WIP Method =
#      WIP Balancing.)
#  10. Service Agreements (DCM0425 license-gated, but the screen exists.
#      Per-customer/per-stock preventive-maintenance program with expiry,
#      agreement #, program category.)
#  11. Service Information (Employee Profile sub-screen): Work Order Rate
#      Per Hour, Work Order Cost Per Hour, Work Order Account (GL),
#      Service Location, Inside/Outside Shift, Road Technician flag,
#      Drag-and-Stick flag, weekly schedule grid.
#  12. Job Codes (manufacturer-specific job-code library: code, description,
#      estimated hours, parts-template suggestions).
#  13. Labor Pricing (rate matrix by branch × job code × labor-type:
#      Detail, Parts, Changes, Comments, Maintenance — each is a tab on
#      the Labor Pricing screen.)
#  14. ID InspectionPlus (form-based digital inspection: Inspection Number,
#      Inspection Name, Description, Stock Number, Reference Number,
#      photos, internal comments, machine hours, last service date. Form
#      types include Rental-Return Inspection, Pre-Rental Inspection,
#      Field-Service inspection, etc.)
#  15. IntelliTech Scheduled Work Orders (technician-by-day schedule grid:
#      per-tech weekly hours allotted vs scheduled, one cell per
#      (technician, day) showing each assigned WO with type-prefix
#      WAR/INT/CUSTOMER and estimated hours.)
#
# QEP coverage today (per database.types.ts):
#   service_jobs (header), service_quotes/lines/approvals, service_timecards,
#   service_job_events, service_job_blockers, service_completion_feedback,
#   service_branch_config, service_tat_metrics/targets, service_internal_
#   billing_line_staging, service_knowledge_base, service_customer_
#   notifications, technician_profiles, technician_job_performance,
#   job_codes, job_code_observations/template_suggestions, demos +
#   demo_inspections, maintenance_schedules, equipment_service_intervals,
#   inventory_event_triggers, service_requests.
#
# QEP MAJOR GAPS for Phase-4:
#   * Multi-segment WOs (no service_job_segments table). This is THE
#     architectural gap — every non-trivial WO in IntelliDealer has 2-5
#     segments, each with its own job code/tech/hours/GL.
#   * Three-Cs split (Complaint/Cause/Correction) as separate columns —
#     currently mashed into customer_problem_summary/ai_diagnosis_summary.
#   * Per-WO Tax Codes 1-4 (Parts) + 1-2 (Labor) — 6 distinct tax-routing
#     slots that drive the AvaTax decision payload.
#   * WO Type enum forcing GL routing (Customer / Internal / Warranty /
#     Goodwill / Maintenance / Pickup-Delivery / Demo / PDI).
#   * Pricing-group override on WO (e.g. COST for internal, LIST for
#     warranty resale).
#   * Sold-To / Ship-To address override per WO.
#   * Labor Pricing matrix table (rate by branch × job code × tech-level
#     × labor-type [Detail, Parts, Changes, Comments, Maintenance]).
#   * Labor Pricing audit table (rate-change history for warranty
#     re-submission compliance).
#   * Service Agreements table (PM contracts) — entirely missing.
#   * WIP aging buckets (Current/31-60/61-90/91-120/Over 120) as
#     materialized view.
#   * Warranty Claim # + status + approved $ — no warranty_claims table.
#   * ID InspectionPlus templated inspection forms (per-form schema with
#     photo/signature/numeric/yes-no question types) — demo_inspections
#     exists but is demo-specific; need a generic inspection-template
#     system with run instances.
#   * Pre-rental and rental-return inspections (currently coupled through
#     demo_inspections only).
#   * Tech rate/cost columns on technician_profiles + Drag-and-Stick,
#     Road-Technician, weekly-schedule grid.
#   * IntelliTech per-tech-per-day rollup view.
#   * Per-WO PO number (vs per-customer default PO).
#   * GL account columns for Labor / Customer / Warranty / Internal on
#     each segment.
#   * Shop/Bay assignment (free-text shop_or_field is too coarse).
#   * Manufacturer-specific Job Code alphanumeric (job_codes has only
#     internal job_name).
#   * Cause-Code job-code enum on segments (Reason: N=new R=repeat etc.).
#
# Severity calls:
#   - Multi-segment, Three-Cs split, Tax codes, WO Type enum, Warranty
#     Claim fields, Service Agreement table, Labor Pricing matrix and
#     ID InspectionPlus templates are MUST gaps — they block warranty
#     submission, AvaTax compliance, PM revenue, and rental returns.
#   - WIP aging buckets, IntelliTech grid, Recovery %, Shop/Bay are
#     SHOULD — they exist as workarounds but materially harm rep + tech
#     productivity.
# ─────────────────────────────────────────────────────────────────────────────

