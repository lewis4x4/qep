  - id: timecard.recovery_pct
    intellidealer_label: "Recovery % (Hours Worked vs Hours Charged)"
    intellidealer_screen: "(derived — Phase-5 also)"
    intellidealer_data_source: "EMPTC"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-4_Service_Service-Information__3.00.48.txt
    intellidealer_field_type: percent
    intellidealer_purpose: |
      Hours billed to customer / hours actually worked. Above 100% =
      tech beating standard hours; below 100% = giving away time.
      Critical service-discipline KPI.
    qep_status: BUILT
    qep_table: technician_job_performance
    qep_column: null
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.technician_job_performance"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains technician_job_performance."
    severity: must
    category: financial
    migration_hint: |
      CREATE OR REPLACE VIEW v_tech_recovery_30d AS
        SELECT
          t.user_id AS technician_id,
          SUM(s.estimated_hours) AS hours_charged,
          SUM(tc.hours) AS hours_worked,
          CASE WHEN SUM(tc.hours) = 0 THEN NULL
               ELSE (SUM(s.estimated_hours) / SUM(tc.hours)) * 100
          END AS recovery_pct
        FROM technician_profiles t
        LEFT JOIN service_timecards tc ON tc.technician_id = t.user_id
                                       AND tc.clocked_in_at > now() - INTERVAL '30 days'
        LEFT JOIN service_job_segments s ON s.id = tc.segment_id
        GROUP BY t.user_id;
    ui_surface_hint: "Employee Profile + Service Manager dashboard"
    dependencies: [work_order_segment.actual_hours, work_order_segment.estimated_hours]

