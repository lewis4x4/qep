  # ==========================================================================
  # SECTION 7 — TECHNICIAN SERVICE SCHEDULING (IntelliTech grid)
  # ==========================================================================
  - id: intellitech.schedule_grid
    intellidealer_label: "IntelliTech Scheduled Work Orders (per-tech-per-day grid)"
    intellidealer_screen: "Technician Service Scheduling"
    intellidealer_data_source: "ITSCH"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR/Phase-4_Service/IntelliTech Scheduled Work Orders.txt
      - docs/IntelliDealer/_OCR/Phase-4_Service/Technician Service Scheduling.txt
    intellidealer_field_type: computed
    intellidealer_purpose: |
      Aggregated dispatch grid showing each tech's week (Tue-Mon),
      with per-day "scheduled / available" hours and a stacked block
      per WO (label = customer + machine + hours, color = warranty/
      internal/customer-pay). Dispatcher's primary planning surface.
    qep_status: MISSING
    qep_table: null
    qep_column: null
    qep_evidence: []
    qep_gap_notes: |
      Underlying data exists (service_jobs.scheduled_start_at, .technician_id)
      but no aggregated grid view + UI. Need a query that materializes
      the per-tech-per-day rollup.
    severity: must
    category: workflow
    migration_hint: |
      CREATE OR REPLACE VIEW v_tech_daily_capacity AS
        SELECT
          t.user_id AS technician_id,
          d.day::date AS day,
          (t.weekly_schedule ->> trim(both '"' from to_char(d.day, '"dy"')))::numeric AS available_hours,
          COALESCE(SUM(s.estimated_hours), 0) AS scheduled_hours,
          jsonb_agg(jsonb_build_object(
            'service_job_id', j.id,
            'wo_number', j.wo_number,
            'customer', c.name,
            'type', s.type,
            'estimated_hours', s.estimated_hours
          )) FILTER (WHERE j.id IS NOT NULL) AS scheduled_jobs
        FROM technician_profiles t
        CROSS JOIN generate_series(now()::date - 7, now()::date + 7, '1 day') AS d(day)
        LEFT JOIN service_jobs j ON j.technician_id = t.user_id
                                AND j.scheduled_start_at::date = d.day
        LEFT JOIN service_job_segments s ON s.service_job_id = j.id
        LEFT JOIN qrm_companies c ON c.id = j.customer_id
        GROUP BY t.user_id, d.day, t.weekly_schedule;
    ui_surface_hint: "Service Scheduling page (own surface)"
    dependencies: [work_order_segment.segment_number, tech.weekly_schedule]

