  # ==========================================================================
  # SECTION 8 — WORK IN PROCESS (WIP) AGING
  # ==========================================================================
  - id: wip.aging_buckets
    intellidealer_label: "WIP Aging Buckets (Current / 31-60 / 61-90 / 91-120 / Over 120)"
    intellidealer_screen: "Work In Process"
    intellidealer_data_source: "WIPRPT"
    intellidealer_evidence:
      - docs/IntelliDealer/_OCR_PNG/Phase-4_Service_Work-In-Process__3.27.11.txt
    intellidealer_field_type: currency
    intellidealer_purpose: |
      Stratified aging report showing un-invoiced WIP by age bucket.
      Critical financial-discipline metric — the longer parts/labor
      sit on an open WO, the more cash the dealer is floating, and
      the higher the risk of margin loss. Standard buckets: Current
      (0-30 days), 31-60, 61-90, 91-120, Over 120.
    qep_status: MISSING
    qep_table: null
    qep_column: null
    qep_evidence: []
    qep_gap_notes: |
      No WIP aging materialized view. Without it the service manager
      cannot prioritize old-WO close-out — the largest single source of
      margin leak in service.
    severity: must
    category: financial
    migration_hint: |
      CREATE MATERIALIZED VIEW mv_service_wip_aging AS
        SELECT
          j.workspace_id,
          j.branch_id,
          CASE
            WHEN now() - j.created_at < INTERVAL '30 days'  THEN 'current'
            WHEN now() - j.created_at < INTERVAL '60 days'  THEN 'd31_60'
            WHEN now() - j.created_at < INTERVAL '90 days'  THEN 'd61_90'
            WHEN now() - j.created_at < INTERVAL '120 days' THEN 'd91_120'
            ELSE 'over_120'
          END AS bucket,
          COUNT(*) AS wo_count,
          SUM(wip.wip_value_cents) AS total_wip_cents
        FROM service_jobs j
        JOIN mv_service_jobs_wip wip ON wip.id = j.id
        WHERE j.closed_at IS NULL
        GROUP BY j.workspace_id, j.branch_id, bucket;
      CREATE INDEX ON mv_service_wip_aging (workspace_id, branch_id, bucket);
    ui_surface_hint: "Work In Process page (own surface) — bucket bars + drill-into-WOs"
    dependencies: [work_order.current_value]

