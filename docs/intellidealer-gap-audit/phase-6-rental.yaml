# contract editor, billing engine, rate cards, fleet utilization, and sub-rental
# screens are referenced via context-menu actions ("Edit", "Print", "Close",
# "Return", "Need to create a new contract? Click here", "Reverse a Rental
# Invoice") but no separate help PDFs were captured. To meet the task's
# "Capture EVERY field" bar — and because rental insurance, damage waiver, RPO,
# hours, deposit, sub-rental and fuel charges are financial-must concepts — I
# have inferred the full rental contract surface from:
#   1. Rental Counter PDF (data source RMCONT, security switch 840, return
#      codes R/O/E/H, contract type enum rental/rent-to-purchase/reservation/
#      request/demo/loaner/held, VESign signing, multi-unit asterisk).
#   2. The QEP rental_* tables already shipped (rental_contracts,
#      rental_contract_extensions, rental_rate_rules, rental_returns).
#   3. Standard IntelliDealer/VitalEdge rental contract data model conventions
#      (RMCONT header + RMCONTL line + RMRATE + RMRPO + RMINS sub-files).
# Every inferred row is flagged in `intellidealer_evidence` as
# "PDF mentions context-menu action ... no field-level help page captured" so
# downstream readers know which rows came from documented help text vs.
# inferred-from-workflow.

