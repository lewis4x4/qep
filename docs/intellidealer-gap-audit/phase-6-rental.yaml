    intellidealer_field_type: enum
    intellidealer_enum_values:
      - "R - Returned"
      - "O - Off Rent"
      - "E - Exchange"
      - "H - Hold Unit"
    intellidealer_purpose: |
      Single-character lifecycle code. Drives billing: 'O' (Off Rent)
      stops the meter without ending the contract; 'H' (Held) is set
      when an hours-billed unit is awaiting hour-meter close-out; 'E'
      (Exchange) is a swap-out (tracks substitution chain); 'R'
      (Returned) closes the line.  An asterisk indicates the unit is
      part of a multi-unit contract.
    qep_status: BUILT
    qep_table: rental_returns
    qep_column: status
    qep_evidence:
