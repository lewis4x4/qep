      - docs/IntelliDealer/Phase-6_Rental/Rental Counter.pdf (page 2)
    intellidealer_field_type: text
    intellidealer_purpose: |
      Free-text search by contract number. Primary lookup path used by
      counter reps and dispatch when a customer calls with a contract
      number from their rental ticket.
    qep_status: BUILT
    qep_table: rental_contracts
    qep_column: id
    qep_evidence:
      - "rental_contracts.id (uuid PK)"
    qep_gap_notes: |
      QEP uses uuid for contract id; IntelliDealer uses a human-readable
      contract number. We will need a `contract_number` text column with
      a sequence-style format like 'RC-2026-00042' for human search.
      Currently customers cannot search by a friendly contract number.
    severity: must
    category: operational
    migration_hint: |
      ALTER TABLE public.rental_contracts
        ADD COLUMN contract_number TEXT;
      CREATE UNIQUE INDEX rental_contracts_contract_number_uniq
        ON public.rental_contracts (workspace_id, contract_number)
        WHERE contract_number IS NOT NULL;
      -- Backfill via per-workspace sequence:
      CREATE SEQUENCE IF NOT EXISTS public.rental_contract_number_seq;
      COMMENT ON COLUMN public.rental_contracts.contract_number IS
        'Human-readable contract number, e.g. RC-2026-00042. Maps to IntelliDealer RMCONT contract number.';
    ui_surface_hint: "Rental list search input + contract detail header"
    dependencies: []

