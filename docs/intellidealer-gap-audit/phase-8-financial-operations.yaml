      - "31-60"
      - "61-90"
      - "91-120"
      - "Over 120"
    intellidealer_purpose: |
      Color-band tag per row (legend visible at bottom of AR detail screen).
      Identifies the aging bucket each individual invoice falls into so AR
      clerks can prioritize calls.
    qep_status: BUILT
    qep_table: "customer_invoices"
    qep_column: "(derived from balance_due/due_date)"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.customer_invoices"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains customer_invoices."
    severity: "should"
    category: "reporting"
    migration_hint: |
      ALTER TABLE customer_invoices
        ADD COLUMN aging_bucket TEXT GENERATED ALWAYS AS (
          CASE
            WHEN balance_due <= 0 THEN 'paid'
            WHEN (CURRENT_DATE - due_date::date) <= 0    THEN 'current'
            WHEN (CURRENT_DATE - due_date::date) <= 30   THEN '1_30'
            WHEN (CURRENT_DATE - due_date::date) <= 60   THEN '31_60'
            WHEN (CURRENT_DATE - due_date::date) <= 90   THEN '61_90'
            WHEN (CURRENT_DATE - due_date::date) <= 120  THEN '91_120'
            ELSE 'over_120'
          END
        ) STORED;
    ui_surface_hint: "AR detail row color tag"
    dependencies:
