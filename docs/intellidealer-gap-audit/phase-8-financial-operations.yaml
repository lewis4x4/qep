  - id: ar_aging.invoice_first_digit
    intellidealer_label: "Select Invoice 1st Digit"
    intellidealer_screen: "Accounts Receivable - Outstanding A/R"
    intellidealer_data_source: "ARFile"
    intellidealer_evidence:
      - Phase-8_Financial-Operations/Accounts Receivable - Outstanding A:R.pdf
      - Phase-8_Financial-Operations/Accounts-Receivable__3.26.00.png
      - Phase-8_Financial-Operations/Accounts-Receivable__3.26.05.png
      - _OCR_PNG/Phase-8_Financial-Operations_Accounts-Receivable__3.26.00.txt
    intellidealer_field_type: "enum"
    intellidealer_enum_values:
      - "G (Equipment)"
      - "P (Parts)"
      - "R (Rental)"
      - "W (Work Order/Service)"
      - "User Defined (custom location-specific digits)"
    intellidealer_purpose: |
      First-digit prefix of the invoice number identifies which sub-system
      generated the invoice (Equipment/Parts/Rental/Work Order). Drives
      sub-ledger filtering for AR aging reports. Each location can configure
      additional custom digits via System Settings-Location. Reserved letters
      Q, L, R cannot be used (sales-order reserved). This is foundational for
      AR drill-downs and reconciliation by source system.
    qep_status: BUILT
    qep_table: "customer_invoices"
    qep_column: "invoice_source_code"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.customer_invoices.invoice_source_code"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains customer_invoices.invoice_source_code."
    severity: "should"
    category: "financial"
    migration_hint: |
      ALTER TABLE customer_invoices
        ADD COLUMN invoice_source_code TEXT
          CHECK (invoice_source_code IN ('EQUIPMENT','PARTS','RENTAL','SERVICE','GENERAL'));
      CREATE INDEX customer_invoices_source_idx ON customer_invoices(workspace_id, invoice_source_code);
      COMMENT ON COLUMN customer_invoices.invoice_source_code IS 'IntelliDealer invoice 1st-digit equivalent: EQUIPMENT(E)/PARTS(P)/RENTAL(R)/SERVICE(W).';
    ui_surface_hint: "AR aging filter chips on Finance > AR Outstanding; sub-ledger reconciliation views"
    dependencies: []

  - id: ar_aging.bucket_current
    intellidealer_label: "Current"
    intellidealer_screen: "Accounts Receivable - Outstanding A/R"
    intellidealer_data_source: "ARFile"
    intellidealer_evidence:
      - Phase-8_Financial-Operations/Accounts-Receivable__3.26.00.png
      - _OCR_PNG/Phase-8_Financial-Operations_Accounts-Receivable__3.26.00.txt
    intellidealer_field_type: "currency"
    intellidealer_purpose: |
      Total dollars of A/R that are not past due. First aging bucket on the
      AR Outstanding bar chart and pie chart. Drives DSO and credit-hold
      decisions across the business. Real values seen on screen: 158,806.72
      (LAKE CITY 04/21/2026).
    qep_status: BUILT
    qep_table: "ar_aging_view"
    qep_column: "current_amount"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Views.ar_aging_view.current_amount"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains ar_aging_view.current_amount."
    severity: "must"
    category: "financial"
    migration_hint: |
      CREATE OR REPLACE VIEW ar_aging_view AS
      SELECT
        i.workspace_id,
        i.crm_company_id,
        i.branch_id,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) <= 0 THEN i.balance_due ELSE 0 END) AS current_amount,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) BETWEEN 1 AND 30  THEN i.balance_due ELSE 0 END) AS bucket_1_30,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) BETWEEN 31 AND 60 THEN i.balance_due ELSE 0 END) AS bucket_31_60,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) BETWEEN 61 AND 90 THEN i.balance_due ELSE 0 END) AS bucket_61_90,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) BETWEEN 91 AND 120 THEN i.balance_due ELSE 0 END) AS bucket_91_120,
        SUM(CASE WHEN (CURRENT_DATE - i.due_date::date) > 120 THEN i.balance_due ELSE 0 END) AS bucket_over_120,
        SUM(i.balance_due) AS total_outstanding
      FROM customer_invoices i
      WHERE i.balance_due > 0 AND i.status NOT IN ('void','cancelled')
      GROUP BY 1,2,3;
    ui_surface_hint: "Finance > AR Outstanding (bar/pie chart and tabular drilldown)"
    dependencies:
      - customer_invoices.balance_due
      - customer_invoices.due_date

