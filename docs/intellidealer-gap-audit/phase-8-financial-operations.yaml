  - id: ap_aging.aging_method
    intellidealer_label: "Aging Method (Due Date / Invoice Date)"
    intellidealer_screen: "Accounts Payable Outstanding"
    intellidealer_data_source: "OUTSTD"
    intellidealer_evidence:
      - Phase-8_Financial-Operations/Accounts Payable Outstanding.pdf
      - Phase-8_Financial-Operations/Accounts-Payable__3.26.26.png
    intellidealer_field_type: "enum"
    intellidealer_enum_values:
      - "Due Date"
      - "Invoice Date"
    intellidealer_purpose: |
      Aging basis for AP outstanding report. Due Date age = days since
      invoice was due (cash-flow planning view). Invoice Date age = days
      since invoice issued (DPO measurement view).
    qep_status: BUILT
    qep_table: "v_ap_outstanding_summary"
    qep_column: "aging_basis"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Views.ap_aging_view.aging_basis"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains ap_aging_view.aging_basis."
    severity: "must"
    category: "financial"
    migration_hint: |
      CREATE OR REPLACE VIEW ap_aging_view AS
      SELECT v.id AS vendor_id, v.workspace_id, v.code AS vendor_code, v.name AS vendor_name,
        SUM(CASE WHEN i.balance_due > 0 AND (CURRENT_DATE - i.due_date::date) <= 0 THEN i.balance_due ELSE 0 END) AS current_amount,
        SUM(CASE WHEN i.balance_due > 0 AND (CURRENT_DATE - i.due_date::date) BETWEEN 1 AND 30 THEN i.balance_due ELSE 0 END) AS bucket_1_30,
        SUM(CASE WHEN i.balance_due > 0 AND (CURRENT_DATE - i.due_date::date) BETWEEN 31 AND 60 THEN i.balance_due ELSE 0 END) AS bucket_31_60,
        SUM(CASE WHEN i.balance_due > 0 AND (CURRENT_DATE - i.due_date::date) BETWEEN 61 AND 90 THEN i.balance_due ELSE 0 END) AS bucket_61_90,
        SUM(CASE WHEN i.balance_due > 0 AND (CURRENT_DATE - i.due_date::date) > 90 THEN i.balance_due ELSE 0 END) AS bucket_over_90,
        SUM(CASE WHEN i.balance_due > 0 THEN i.balance_due ELSE 0 END) AS total_outstanding
      FROM vendor_invoices i
      JOIN vendor_profiles v ON v.id = i.vendor_id
      GROUP BY 1,2,3,4;
    ui_surface_hint: "Finance > AP Outstanding"
    dependencies: []

