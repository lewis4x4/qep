    intellidealer_evidence:
      - docs/IntelliDealer/Phase-9_Advanced-Intelligence/Customer Portal.pdf
    intellidealer_field_type: "json"
    intellidealer_purpose: |
      Standard 30/60/90/120+ aging buckets per customer with click-through to
      line-level outstanding detail. Backbone of cash collection.
    qep_status: BUILT
    qep_table: "v_customer_portal_ar_aging"
    qep_column: ""
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Views.v_customer_portal_ar_aging"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains v_customer_portal_ar_aging."
    severity: "must"
    category: "financial"
    migration_hint: |
      -- Pre-req: AR invoice + payment tables. Then:
      CREATE MATERIALIZED VIEW mv_customer_ar_aging AS
      SELECT
        i.workspace_id,
        i.company_id,
        SUM(CASE WHEN due_date >= CURRENT_DATE THEN balance_cents ELSE 0 END) AS current_cents,
        SUM(CASE WHEN due_date BETWEEN CURRENT_DATE - INTERVAL '30 days' AND CURRENT_DATE - INTERVAL '1 day' THEN balance_cents ELSE 0 END) AS d30_cents,
        SUM(CASE WHEN due_date BETWEEN CURRENT_DATE - INTERVAL '60 days' AND CURRENT_DATE - INTERVAL '31 days' THEN balance_cents ELSE 0 END) AS d60_cents,
        SUM(CASE WHEN due_date BETWEEN CURRENT_DATE - INTERVAL '90 days' AND CURRENT_DATE - INTERVAL '61 days' THEN balance_cents ELSE 0 END) AS d90_cents,
        SUM(CASE WHEN due_date < CURRENT_DATE - INTERVAL '90 days' THEN balance_cents ELSE 0 END) AS d120plus_cents
      FROM /* invoices */ i
      WHERE i.balance_cents > 0
      GROUP BY i.workspace_id, i.company_id;
    ui_surface_hint: "Account 360 AR aging widget; collections workbench"
    dependencies: [customer.total_ar]

