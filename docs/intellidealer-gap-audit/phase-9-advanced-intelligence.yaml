  - id: customer.available_credit
    intellidealer_label: "Available Credit"
    intellidealer_screen: "Customer Portal"
    intellidealer_data_source: "Computed (Feature 6178 + special credit checks)"
    intellidealer_evidence:
      - docs/IntelliDealer/Phase-9_Advanced-Intelligence/Customer Portal.pdf
    intellidealer_field_type: "currency"
    intellidealer_purpose: |
      Real-time computed available credit = credit_limit minus open AR minus
      open commitments (quotes, orders, rentals). Gated behind Feature 6178
      and the special-credit-check switch in IntelliDealer system settings.
      Displayed only when the dealership has explicitly opted in.
    qep_status: BUILT
    qep_table: "qrm_companies"
    qep_column: "available_credit_cents (computed view)"
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.qrm_companies"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains qrm_companies."
    severity: "must"
    category: "financial"
    migration_hint: |
      CREATE OR REPLACE VIEW v_customer_available_credit AS
      SELECT
        c.workspace_id, c.id AS company_id,
        c.credit_limit_cents,
        c.total_ar_cents,
        COALESCE(commit.open_commit_cents, 0) AS open_commit_cents,
        c.credit_limit_cents - COALESCE(c.total_ar_cents,0) - COALESCE(commit.open_commit_cents,0) AS available_credit_cents
      FROM qrm_companies c
      LEFT JOIN LATERAL (
        SELECT SUM(amount_cents) AS open_commit_cents
        FROM /* qrm_deals + rental_contracts open commitments */
        WHERE company_id = c.id
      ) commit ON true;
    ui_surface_hint: "Account 360 financial card; deal page guard rail"
    dependencies: [customer.credit_limit, customer.total_ar]

