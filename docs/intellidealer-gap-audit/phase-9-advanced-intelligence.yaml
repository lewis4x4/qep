  - id: customer_portal_view.alerts
    intellidealer_label: "Alerts (Parts / Service / Equipment / Rental)"
    intellidealer_screen: "Customer Portal > Alerts"
    intellidealer_data_source: "CMASTR + business-area alerts"
    intellidealer_evidence:
      - docs/IntelliDealer/Phase-9_Advanced-Intelligence/Customer Portal.pdf
    intellidealer_field_type: "json"
    intellidealer_purpose: |
      Per-business-area alerts (Parts, Service, Equipment, Rental) configured
      on the customer. Surfaces things like "always require deposit",
      "on warranty hold", "fleet manager travels Mondays".
      Critical for cross-department awareness.
    qep_status: "BUILT"
    qep_table: "analytics_alerts"
    qep_column: "alert_type"
    qep_evidence:
      - "Phase-9 schema slice analytics_alerts has alert_type, role_target, branch_id, status, severity, suggested_action"
    qep_gap_notes: |
      QEP analytics_alerts is generic and supports per-customer/per-role
      alerts via entity_type/entity_id. The portal needs a deterministic
      tab pivot by business area — add an explicit "department" dimension
      or use role_target='parts' | 'service' | 'equipment' | 'rental'.
    severity: "should"
    category: "operational"
    migration_hint: |
      -- already present via analytics_alerts; ensure helper view:
      CREATE OR REPLACE VIEW v_customer_alerts_by_area AS
      SELECT
        a.workspace_id,
        a.entity_id AS company_id,
        CASE a.role_target
          WHEN 'parts' THEN 'Parts'
          WHEN 'service' THEN 'Service'
          WHEN 'equipment' THEN 'Equipment'
          WHEN 'rental' THEN 'Rental'
          ELSE 'General'
        END AS area,
        a.title, a.description, a.severity, a.status, a.suggested_action
      FROM analytics_alerts a
      WHERE a.entity_type = 'company';
    ui_surface_hint: "Account 360 alerts panel with Parts/Service/Equipment/Rental tabs"
    dependencies: []

  - id: customer_portal_view.ar_aging
