# IntelliDealer Phase-9 (DataMiner / OEM Portal / advanced reporting) is, in
# this surface set, primarily expressed through the Customer Portal screen —
# a 360-degree intelligence dashboard that aggregates every operationally
# relevant signal about a customer (A/R aging, credit, equipment fleet, all
# open documents in every department, invoice/work order/rental history,
# scheduled calls, marketing exposure, traffic movement). It is the closest
# IntelliDealer analog to the "moonshot" QEP Owner/Operator Cockpit. Every
# tile in the portal is a *view* over an underlying entity — we capture each
# tile as a field-id even when the underlying join target lives in another
# phase, because the gap is whether QEP can render the equivalent tile in
# the Owner Cockpit / Account 360 view, not whether the source row exists.

