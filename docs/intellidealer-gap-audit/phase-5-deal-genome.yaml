# ─────────────────────────────────────────────────────────────────────────────
# AUDITOR NOTE
# Phase-5 in IntelliDealer ("Deal Genome / BI") is composed of three surfaces:
#   1. Data Miner   — saved-query repository for ad-hoc data extraction
#                     (Data Source: WEBQRYAL/C/F/H/R, Security: 505)
#   2. Analysis Reports — 7 service/operations dashboards under Product
#                     Support > Service > Analysis Reports:
#                       • Billing
#                       • Days  (open/start/complete/billing aging)
#                       • Efficiency  (hours worked vs charged, recovery)
#                       • Work In Process  (WIP balancing aging buckets)
#                       • Quote Gain or Loss  (standard hrs vs worked)
#                       • Payroll Hours  (premium-code summary)
#   3. Management Central > Financial > Credit Limit Analysis
#   4. Management Central > CRM > Profitability  (margin $/% by customer)
#
# These are *output / reporting* surfaces, not inventory records, but they
# expose the field set that QEP must compute and persist (or compute on read)
# to replace IntelliDealer for daily management. Each grid column captured
# below is an independently load-bearing field.
#
# QEP has qb_deals (commission/margin), qb_quotes (rich cost layers), qrm_deals
# (pipeline-level margin), and qrm_equipment (asset-level cost) — but NO
# saved-query (Data Miner) layer, NO work-order analytics, NO WIP aging
# buckets, NO AR credit-limit table, NO labor-recovery table, NO payroll
# premium-code rollup, and NO customer-profitability materialized view.
# ─────────────────────────────────────────────────────────────────────────────

