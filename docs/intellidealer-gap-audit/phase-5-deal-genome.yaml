      dollars or by margin percentage.
    qep_status: BUILT
    qep_table: qb_deals
    qep_column: gross_margin_cents
    qep_evidence:
      - "apps/web/src/lib/database.types.ts public.Tables.qb_deals.gross_margin_cents"
    qep_gap_notes: "Resolved by shipped IntelliDealer gap-audit migration; current Database type contains qb_deals.gross_margin_cents."
    severity: should
    category: reporting
    migration_hint: |
      CREATE MATERIALIZED VIEW qrm_customer_profitability_mv AS
      SELECT
        d.workspace_id,
        d.company_id,
        SUM(d.total_revenue_cents) AS sales_cents,
        SUM(d.total_cost_cents) AS cost_cents,
        SUM(d.gross_margin_cents) AS margin_cents,
        CASE WHEN SUM(d.total_revenue_cents) = 0 THEN 0
             ELSE SUM(d.gross_margin_cents)::numeric
                  / SUM(d.total_revenue_cents) * 100
        END AS margin_pct,
        date_trunc('day', now()) AS as_of_date
      FROM qb_deals d
      WHERE d.deleted_at IS NULL
      GROUP BY d.workspace_id, d.company_id;
      CREATE UNIQUE INDEX qrm_customer_profitability_mv_pk
        ON qrm_customer_profitability_mv(workspace_id, company_id);
    ui_surface_hint: "Reports → Customer Profitability → sort dropdown"
    dependencies: []

