# bunfig.toml — Bun configuration for QEP monorepo
#
# F12 fix: bare `bun test` from the repo root was hanging because Bun walked
# supabase/functions/_shared/*.test.ts, which import Deno-only APIs (Deno.env,
# Deno.serve, jsr: imports). Bun doesn't provide Deno globals — the import
# chain blocks without a clear error.
#
# Solution: scope bun test to apps/ by default. Edge function tests require
# Deno and must be run via `bun run test:edge:*` scripts (which delegate to deno).
#
# WAVE Quality Tail (Slice 2): raw `bun test` from this directory still
# completes (~25s) but reports ~31 pollution failures. Root cause is
# bun:test's mock.module() API — module mocks persist for the process
# lifetime with no public unmock primitive, so the 34+ test files that
# call mock.module("@/lib/supabase", ...) (or @/hooks/useAuth, etc.)
# leak their mocks into every subsequent test file. There is no
# userland fix — see https://github.com/oven-sh/bun/issues for the
# upstream tracking issue.
#
# The canonical green-light sweep is `bun run test` (the npm script),
# which chains scripts/run-unit-tests.mjs + scripts/run-integration-
# tests.mjs — both spawn each test file in its own bun process so
# mock.module persistence cannot cross file boundaries. That is the
# sweep gated in .github/workflows/ci.yml.
#
# To run ALL scoped tests: `bun run test` (recommended; 100% green)
# Raw `bun test` is available for quick spot-checks but pre-existing
# mock.module pollution shows up as ~31 fails — they all pass when
# each file runs in isolation (`bun run test`).
# To run edge function tests: bun run test:edge:dge (or equivalent deno commands)
#
# Dependency CVE scan: `bun run security:deps` (npm audit on root + apps/web).

[test]
root = "apps"
# Per-test timeout safety net (WAVE CI/Quality Slice 4). The
# pre-Slice-3 hang turned out to be a stuck React tree from
# missing afterEach(cleanup) in older integration tests — the
# global cleanup installed in apps/web/test-setup/happy-dom.ts
# resolves it. The 30-second timeout below is the belt-and-
# suspenders safety net so any single test that does hang cannot
# block the whole suite.
timeout = 30000
# Slice 08 CP6: happy-dom preload for .integration.test.tsx files.
# Unit .test.ts files are unaffected — the registrator only installs
# document/window globals when they're not already defined.
#
# env-vars preload sets VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY on
# process.env so `apps/web/src/lib/supabase.ts` doesn't throw on module
# load. Must run BEFORE happy-dom in case a happy-dom consumer imports
# supabase during registration. See test-setup/env-vars.ts for rationale.
preload = [
  "./apps/web/test-setup/env-vars.ts",
  "./apps/web/test-setup/happy-dom.ts",
]
